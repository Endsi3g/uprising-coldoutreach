name: CI — Uprising ColdOutreach

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///./test.db
        run: |
          pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          pytest tests/ -v --tb=short --ignore=tests/test_apify_integration.py
        # apify integration tests require external API calls — excluded in CI

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_results.txt
          if-no-files-found: ignore

  frontend-build:
    name: Frontend Build (Node / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prospectai/package-lock.json

      - name: Install npm dependencies
        working-directory: ./prospectai
        run: npm ci --prefer-offline

      - name: TypeScript check
        working-directory: ./prospectai
        run: npm run lint

      - name: Build frontend
        working-directory: ./prospectai
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: prospectai/dist/
          retention-days: 7
